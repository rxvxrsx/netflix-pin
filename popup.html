<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d12;
      --panel: #151922;
      --panel-soft: #1d2330;
      --line: #2b3342;
      --text: #f7f8fb;
      --muted: #aab3c2;
      --red: #e50914;
      --red-strong: #f31b27;
      --green: #21c16b;
      --green-strong: #28d978;
      --blue: #67a8ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 360px;
      min-height: 100vh;
      margin: 0;
      padding: 14px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(229, 9, 20, 0.24), transparent 34%),
        linear-gradient(180deg, #11141b 0%, var(--bg) 62%);
      color: var(--text);
    }

    .shell {
      display: grid;
      gap: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(145deg, var(--red), #8c0710);
      color: white;
      font-size: 21px;
      font-weight: 900;
      box-shadow: 0 12px 28px rgba(229, 9, 20, 0.26);
    }

    h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .pill {
      flex: 0 0 auto;
      padding: 4px 8px;
      border: 1px solid rgba(103, 168, 255, 0.34);
      border-radius: 999px;
      background: rgba(103, 168, 255, 0.1);
      color: #cfe2ff;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .panel {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: rgba(21, 25, 34, 0.92);
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .section {
      padding: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .section:first-child {
      border-top: 0;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .field-grid {
      display: grid;
      gap: 8px;
    }

    .setting {
      display: grid;
      gap: 5px;
      text-align: left;
    }

    .setting label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }

    .input-wrap {
      position: relative;
    }

    .setting input,
    .setting select {
      width: 100%;
      min-height: 34px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
      background: #0e1118;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .setting select {
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--muted) 50%),
        linear-gradient(135deg, var(--muted) 50%, transparent 50%);
      background-position:
        calc(100% - 15px) 14px,
        calc(100% - 10px) 14px;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      padding-right: 30px;
    }

    .setting input:focus,
    .setting select:focus {
      border-color: rgba(103, 168, 255, 0.9);
      background: #111722;
      box-shadow: 0 0 0 3px rgba(103, 168, 255, 0.15);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .actions-primary {
      grid-template-columns: 1.25fr 1fr;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: 34px;
      padding: 7px 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      color: white;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.14s ease, filter 0.14s ease, border-color 0.14s ease;
    }

    button:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      cursor: not-allowed;
      filter: grayscale(0.35) brightness(0.72);
      opacity: 0.62;
      transform: none;
      box-shadow: none !important;
    }

    button:disabled:hover {
      filter: grayscale(0.35) brightness(0.72);
      transform: none;
    }

    .btn-secondary {
      border-color: var(--line);
      background: var(--panel-soft);
      color: #dce3ee;
    }

    #saveConfig {
      border-color: rgba(103, 168, 255, 0.25);
      background: #1a2a3d;
      color: #d9e9ff;
    }

    #resetConfig {
      border-color: var(--line);
      background: #20242d;
      color: #dce3ee;
    }

    #start {
      background: linear-gradient(135deg, var(--green), #15834c);
      box-shadow: 0 10px 26px rgba(33, 193, 107, 0.24);
    }

    #stop {
      background: linear-gradient(135deg, var(--red-strong), #a30610);
      box-shadow: 0 10px 26px rgba(229, 9, 20, 0.24);
    }

    .status-card {
      display: grid;
      gap: 9px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(29, 35, 48, 0.96), rgba(15, 18, 25, 0.96));
    }

    .status-row {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 6px;
      align-items: center;
      text-align: left;
      font-size: 11px;
    }

    .status-label {
      color: var(--muted);
      font-weight: 700;
    }

    .status-value {
      min-width: 0;
      color: var(--text);
      font-weight: 800;
      overflow-wrap: anywhere;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .status-value.running {
      background: rgba(103, 168, 255, 0.15);
      color: #67a8ff;
    }

    .status-value.success {
      background: rgba(33, 193, 107, 0.15);
      color: var(--green-strong);
      font-weight: 900;
    }

    .status-value.error {
      background: rgba(229, 9, 20, 0.15);
      color: var(--red-strong);
    }

    .status-value.stopped {
      background: rgba(170, 179, 194, 0.1);
      color: var(--muted);
    }

    .status-value.plan-mobile {
      background: rgba(170, 179, 194, 0.14);
      color: #d8dee9;
    }

    .status-value.plan-basic {
      background: rgba(103, 168, 255, 0.16);
      color: #9dc3ff;
    }

    .status-value.plan-standard {
      background: rgba(255, 179, 71, 0.16);
      color: #ffc56d;
    }

    .status-value.plan-standard-ads {
      background: rgba(255, 138, 61, 0.18);
      color: #ffb27a;
    }

    .status-value.plan-premium {
      background: rgba(229, 9, 20, 0.2);
      color: #ff6b76;
      font-weight: 900;
    }

    .status-value.plan-unknown {
      background: rgba(170, 179, 194, 0.1);
      color: var(--muted);
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
    }

    .log-toggle {
      width: 24px;
      height: 24px;
      min-height: unset;
      min-width: unset;
      padding: 4px;
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font-size: 11px;
    }

    .log-toggle:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
    }

    #log.hidden {
      display: none;
    }

    .pin-value {
      width: fit-content;
      min-width: 58px;
      padding: 4px 7px;
      border: 1px solid rgba(103, 168, 255, 0.25);
      border-radius: 7px;
      background: rgba(103, 168, 255, 0.08);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
      text-align: center;
    }

    #log {
      min-height: 72px;
      max-height: 140px;
      margin: 0;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: #090b10;
      color: #c8d0dc;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 10px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="header">
      <div class="brand">
        <div class="logo" aria-hidden="true">N</div>
        <div>
          <h1>PIN Auto-Fill</h1>
          <p class="subtitle">ตั้งค่าการกรอก PIN สำหรับหน้า Netflix</p>
        </div>
      </div>
      <div class="pill">v1.0</div>
    </header>

    <section class="panel" aria-label="การตั้งค่า">
      <div class="section">
        <div class="section-title">การตั้งค่า PIN</div>
        <div class="field-grid">
          <div class="setting">
            <label for="startPin">เริ่มต้นจาก PIN</label>
            <div class="input-wrap">
              <input id="startPin" type="number" min="0" max="9999" value="0" inputmode="numeric" />
            </div>
          </div>
          <div class="setting">
            <label for="sortOrder">ลำดับการลอง PIN</label>
            <div class="input-wrap">
              <select id="sortOrder">
                <option value="asc">น้อยไปมาก (0000 → 9999)</option>
                <option value="desc">มากไปน้อย (9999 → 0000)</option>
              </select>
            </div>
          </div>
          <div class="setting">
            <label for="keyDelay">เวลาระหว่างการกดแต่ละปุ่ม (ms)</label>
            <div class="input-wrap">
              <input id="keyDelay" type="number" min="10" value="80" inputmode="numeric" />
            </div>
          </div>
          <div class="setting">
            <label for="codeDelay">เวลาระหว่างแต่ละรหัส (ms)</label>
            <div class="input-wrap">
              <input id="codeDelay" type="number" min="10" value="120" inputmode="numeric" />
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="actions">
          <button id="saveConfig" type="button">บันทึกค่า</button>
          <button id="resetConfig" type="button">รีเซ็ต</button>
        </div>
      </div>

      <div class="section">
        <div class="actions actions-primary">
          <button id="start" type="button">เริ่มทำงาน</button>
          <button id="stop" type="button">หยุดทำงาน</button>
        </div>
      </div>
    </section>

    <section id="status" class="status-card" aria-label="สถานะการทำงาน">
      <div class="status-row">
        <div class="status-label">สถานะ</div>
        <div class="status-value" id="statusText">ยังไม่เริ่ม</div>
      </div>
      <div class="status-row">
        <div class="status-label">PIN ล่าสุด</div>
        <div class="status-value pin-value" id="currentPinText">-</div>
      </div>
      <div class="status-row">
        <div class="status-label">แพ็กเกจ</div>
        <div class="status-value" id="planText">ยังไม่ได้โหลด</div>
      </div>
      <div class="actions">
        <button id="loadPlan" class="btn-secondary" type="button">ดึงข้อมูลแพ็กเกจ</button>
        <button id="goBrowse" class="btn-secondary" type="button">กลับหน้า Browse</button>
      </div>
      <div class="log-header">
        <span>บันทึก</span>
        <button id="toggleLog" class="log-toggle" type="button" title="เปิด/ปิดบันทึก" aria-expanded="true">📋</button>
      </div>
      <pre id="log" aria-label="บันทึกการทำงาน"></pre>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
